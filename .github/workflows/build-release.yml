name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
    
    - name: Get version info
      id: version
      run: |
        VERSION=$(cat app/build.gradle.kts | grep "versionName" | sed 's/.*versionName.*=.*"\([^"]*\)".*/\1/' || echo "1.0.0")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
        name: Release v${{ steps.version.outputs.version }}
        body: |
          ## Release Notes / 发布说明
          
          Download APK below / 在下方下载APK
          
          ### Installation / 安装方法
          1. Download the APK file / 下载APK文件
          2. Enable "Install from unknown sources" / 开启"未知来源安装"
          3. Install the APK / 安装APK
        files: |
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
